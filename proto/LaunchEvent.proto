// LaunchEvent definitions used by the Inhumate Launcher.

syntax = "proto3";

package inhumate.rti.proto;
option csharp_namespace = "Inhumate.RTI.Proto";
import "google/protobuf/empty.proto";

message LaunchEvent {

    oneof which {
        google.protobuf.Empty request_state = 1;
        LaunchItemState state = 2;
    }

    message LaunchItemState {
        string launcher_client_id = 1;
        string configuration = 2;
        string name = 3;
        ProcessState process_state = 4;
        string link_url = 5;
        string link_title = 6;
        string link_description = 7;
        string error = 8;
        string abbreviation = 9;
    }

    enum ProcessState {
        UNKNOWN = 0;
        PENDING = 1;
        STARTED = 2;
        RUNNING = 3;
        STOPPING = 4;
        DONE = 5;
        FAILED = 6;
    }

}
