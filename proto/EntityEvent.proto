// EntityEvent - generic event message for entities

syntax = "proto3";

package inhumate.rti.proto;
option csharp_namespace = "Inhumate.RTI.Proto";

import "Color.proto";

message EntityEvent {

    string id = 1; // entity id
    string type = 2;
    string description = 3;
    string data = 4;
    Color color = 5;

}
