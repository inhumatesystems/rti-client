// Event - generic event message for time-line events etc

syntax = "proto3";

package inhumate.rti.proto;
option csharp_namespace = "Inhumate.RTI.Proto";

import "Color.proto";
import "PropertyValue.proto";

message Event {

    string type = 1;
    string description = 2;
    Color color = 4;

    string template = 5;
    map<string, PropertyValue> properties = 6;

    repeated string entity_ids = 8; // entities involved in the event, relation given by type
}
